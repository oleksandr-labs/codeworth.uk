name: Deploy to Hetzner

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-codeworth
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (standalone)
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Upload build + nginx config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          source: ".next/standalone/,.next/static/,public/,nginx/codeworth.uk.conf"
          target: "/var/www/codeworth.uk/"
          strip_components: 0
          overwrite: true
          timeout: 180s

      - name: Link assets, sync secrets & restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            APP=/var/www/codeworth.uk

            # Symlink static assets into standalone
            mkdir -p "$APP/.next/standalone/.next"
            ln -sfn "$APP/.next/static" "$APP/.next/standalone/.next/static"
            rm -rf "$APP/.next/standalone/public"
            ln -sfn "$APP/public" "$APP/.next/standalone/public"

            # Sync secrets into .env
            sync_env() {
              local key="$1" val="$2"
              [ -z "$val" ] && return
              if grep -q "^${key}=" "$APP/.env" 2>/dev/null; then
                sed -i "s|^${key}=.*|${key}=${val}|" "$APP/.env"
              else
                echo "${key}=${val}" >> "$APP/.env"
              fi
            }
            sync_env "NEXT_PUBLIC_SITE_URL"  "${{ secrets.NEXT_PUBLIC_SITE_URL }}"
            sync_env "TELEGRAM_BOT_TOKEN"    "${{ secrets.TELEGRAM_BOT_TOKEN }}"
            sync_env "TELEGRAM_CHAT_ID"      "${{ secrets.TELEGRAM_CHAT_ID }}"
            sync_env "RESEND_API_KEY"        "${{ secrets.RESEND_API_KEY }}"
            sync_env "RECAPTCHA_SECRET_KEY"  "${{ secrets.RECAPTCHA_SECRET_KEY }}"
            sync_env "LIQPAY_PUBLIC_KEY"     "${{ secrets.LIQPAY_PUBLIC_KEY }}"
            sync_env "LIQPAY_PRIVATE_KEY"    "${{ secrets.LIQPAY_PRIVATE_KEY }}"

            # Link .env into standalone
            rm -f "$APP/.next/standalone/.env"
            ln -sfn "$APP/.env" "$APP/.next/standalone/.env"

            # Restart app
            systemctl restart codeworth
            sleep 3
            systemctl is-active codeworth && echo "==> Service active"
            echo "==> Deploy done"

      - name: Smoke test
        run: |
          sleep 5
          curl -fsS -o /dev/null -w "HTTP %{http_code} | %{time_total}s\n" https://codeworth.uk/ || \
          curl -fsS -o /dev/null -w "HTTP %{http_code} | %{time_total}s\n" http://codeworth.uk/ || \
          echo "Site check done"
