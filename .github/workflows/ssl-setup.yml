name: SSL Setup (run once)

on:
  workflow_dispatch:

jobs:
  ssl:
    runs-on: ubuntu-latest
    steps:
      - name: Check DNS and install SSL
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          command_timeout: 5m
          script: |
            echo "=== Current cert info ==="
            certbot certificates 2>&1 | grep -A5 "codeworth" || echo "No codeworth cert found"
            echo "=== DNS check ==="
            dig +short codeworth.uk
            dig +short www.codeworth.uk
            echo "=== Renew/issue cert ==="
            certbot --nginx -d codeworth.uk -d www.codeworth.uk \
              --non-interactive --agree-tos \
              -m avalonsuport@gmail.com \
              --redirect \
              --force-renewal
            echo "=== Reload nginx ==="
            nginx -t && systemctl reload nginx
            echo "=== Done ==="
            certbot certificates 2>&1 | grep -A8 "codeworth"
