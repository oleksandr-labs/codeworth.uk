name: SSL Setup (run once)

on:
  workflow_dispatch:

jobs:
  ssl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload nginx config with SSL
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          source: "nginx/codeworth.uk.conf"
          target: "/var/www/codeworth.uk/"
          strip_components: 0
          overwrite: true

      - name: Apply config and reload nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          command_timeout: 3m
          script: |
            cp /var/www/codeworth.uk/nginx/codeworth.uk.conf /etc/nginx/sites-available/codeworth.uk
            ln -sf /etc/nginx/sites-available/codeworth.uk /etc/nginx/sites-enabled/codeworth.uk
            nginx -t && systemctl reload nginx && echo "==> Nginx OK"
            sleep 2
            curl -sI https://codeworth.uk/ | head -2
