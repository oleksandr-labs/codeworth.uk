name: Diagnostics
on:
  workflow_dispatch:
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          command_timeout: 2m
          script: |
            echo "=== Service status ==="
            systemctl is-active codeworth
            echo "=== Last 20 log lines ==="
            journalctl -u codeworth --no-pager -n 20 2>&1
