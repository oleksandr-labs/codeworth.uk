name: Diagnostics
on:
  workflow_dispatch:
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          command_timeout: 2m
          script: |
            echo "=== Service status ==="
            systemctl is-active codeworth
            echo "=== Logs around errors ==="
            journalctl -u codeworth --no-pager -n 50 2>&1 | grep -v EPROTO | tail -30
            echo "=== Nginx config check ==="
            grep -A3 "proxy_pass\|listen 443\|listen 80" /etc/nginx/sites-enabled/codeworth.uk | head -20
            echo "=== Test request ==="
            curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3010/en
