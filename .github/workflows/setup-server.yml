name: Setup Server (run once)

on:
  workflow_dispatch:

jobs:
  setup:
    name: Initialize Hetzner server for codeworth.uk
    runs-on: ubuntu-latest

    steps:
      - name: Setup server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e

            echo "=== 1. App directory ==="
            mkdir -p /var/www/codeworth.uk/.next/standalone
            touch /var/www/codeworth.uk/.env

            echo "=== 2. systemd service ==="
            cat > /etc/systemd/system/codeworth.service <<'EOF'
            [Unit]
            Description=Codeworth — Next.js standalone app
            After=network.target

            [Service]
            Type=simple
            User=root
            WorkingDirectory=/var/www/codeworth.uk/.next/standalone
            ExecStart=/usr/bin/node server.js
            EnvironmentFile=/var/www/codeworth.uk/.env
            Environment=PORT=3010
            Environment=NODE_ENV=production
            Environment=HOSTNAME=127.0.0.1
            Restart=always
            RestartSec=5
            StandardOutput=journal
            StandardError=journal
            SyslogIdentifier=codeworth

            [Install]
            WantedBy=multi-user.target
            EOF
            systemctl daemon-reload
            systemctl enable codeworth
            echo "[ok] systemd service created"

            echo "=== 3. Nginx vhost ==="
            cat > /etc/nginx/sites-available/codeworth.uk <<'EOF'
            server {
                listen 80;
                listen [::]:80;
                server_name codeworth.uk www.codeworth.uk;

                location /.well-known/acme-challenge/ { root /var/www/certbot; }

                location / {
                    proxy_pass http://127.0.0.1:3010;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_read_timeout 60s;
                }
            }
            EOF
            ln -sf /etc/nginx/sites-available/codeworth.uk /etc/nginx/sites-enabled/codeworth.uk
            nginx -t && systemctl reload nginx
            echo "[ok] nginx configured"

            echo "=== DONE ==="
            node --version && nginx -v
